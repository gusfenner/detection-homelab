[defaults]
inventory           = ansible/inventory/hosts.ini
roles_path          = ansible/roles
remote_user         = vagrant
host_key_checking   = False
retry_files_enabled = False
stdout_callback     = yaml
timeout             = 60

[ssh_connection]
pipelining = True
ssh_args   = -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
