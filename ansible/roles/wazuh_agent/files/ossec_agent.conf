<!--
  ossec_agent.conf — Wazuh Agent configuration for agent-node VM
  Deployed to: /var/ossec/etc/ossec.conf on the agent VM

  Key sections:
    - Server connection to wazuh-server
    - Localfile: ingest Sysmon events from syslog
    - Localfile: standard Linux auth logs
    - Rootcheck / SCA for baseline hardening checks
-->
<ossec_config>

  <!-- ── Manager connection ────────────────────────────────────────────────── -->
  <client>
    <server>
      <address>192.168.56.10</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
    <config-profile>ubuntu, ubuntu22, ubuntu22.04</config-profile>
    <notify_time>10</notify_time>
    <time-reconnect>60</time-reconnect>
    <auto_restart>yes</auto_restart>
  </client>

  <!-- ── Log collection ────────────────────────────────────────────────────── -->

  <!-- Sysmon for Linux events (written to syslog by Sysmon daemon) -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/syslog</location>
  </localfile>

  <!-- Auth logs: SSH logins, sudo, su -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

  <!-- System messages -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/messages</location>
  </localfile>

  <!-- Bash command log (if PROMPT_COMMAND audit is set) -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/bash_audit.log</location>
  </localfile>

  <!-- Wazuh agent logs -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/ossec/logs/active-responses.log</location>
  </localfile>

  <!-- ── File Integrity Monitoring (FIM) ───────────────────────────────────── -->
  <syscheck>
    <frequency>300</frequency>
    <alert_new_files>yes</alert_new_files>

    <!-- Monitor sensitive directories -->
    <directories check_all="yes" realtime="yes">/etc/cron.d</directories>
    <directories check_all="yes" realtime="yes">/var/spool/cron</directories>
    <directories check_all="yes" realtime="yes">/etc/passwd</directories>
    <directories check_all="yes" realtime="yes">/etc/shadow</directories>
    <directories check_all="yes" realtime="yes">/etc/sudoers.d</directories>
    <directories check_all="yes" realtime="yes">/home</directories>

    <!-- Ignore noisy paths -->
    <ignore>/etc/mtab</ignore>
    <ignore>/etc/mnttab</ignore>
    <ignore>/etc/hosts.deny</ignore>
    <ignore>/etc/mail/statistics</ignore>
    <ignore>/proc</ignore>
    <ignore>/sys/kernel/security</ignore>
  </syscheck>

  <!-- ── Rootcheck ─────────────────────────────────────────────────────────── -->
  <rootcheck>
    <disabled>no</disabled>
    <check_files>yes</check_files>
    <check_trojans>yes</check_trojans>
    <check_dev>yes</check_dev>
    <check_sys>yes</check_sys>
    <check_pids>yes</check_pids>
    <check_ports>yes</check_ports>
    <check_if>yes</check_if>
    <frequency>3600</frequency>
  </rootcheck>

  <!-- ── Active Response ───────────────────────────────────────────────────── -->
  <active-response>
    <disabled>no</disabled>
    <ca_store>etc/wpk_root.pem</ca_store>
  </active-response>

</ossec_config>
